<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>個人記帳</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="個人記帳">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#121212;--sf:#1e1e1e;--card:#252525;--card2:#2d2d2d;
  --acc:#00BFA5;--acc2:#00897B;
  --tx:#e0e0e0;--tx2:#9e9e9e;
  --red:#FF5252;--grn:#69F0AE;--org:#FFB74D;--purple:#CE93D8;--coral:#FF8A65;
  --bdr:rgba(255,255,255,.08);--r:12px
}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:72px;font-size:15px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--acc2);border-radius:4px}
.pg{display:none;padding:16px;max-width:600px;margin:0 auto}
.pg.on{display:block}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bdr);display:flex;z-index:100;height:60px}
.nav-btn{flex:1;border:none;background:none;color:var(--tx2);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:.15s;padding:4px 0}
.nav-btn .ic{font-size:20px}
.nav-btn.on{color:var(--acc)}
/* CARD */
.card{background:var(--sf);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--bdr)}
.card-title{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
/* MODE SELECTOR */
.mode-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:14px}
.mode-btn{padding:9px 4px;border:1.5px solid var(--bdr);background:var(--card);color:var(--tx2);border-radius:8px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;transition:.15s;line-height:1.3}
.mode-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(0,191,165,.1)}
/* FORM */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--card);border:1px solid var(--bdr);color:var(--tx);border-radius:8px;padding:11px 12px;font-size:15px;outline:none;transition:.15s;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{resize:none;height:68px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* PAY OPTS */
.pay-row{display:flex;gap:8px}
.pay-opt{flex:1;padding:10px;border:1.5px solid var(--bdr);background:var(--card);color:var(--tx2);border-radius:8px;cursor:pointer;text-align:center;font-size:14px;font-weight:600;transition:.15s}
.pay-opt.on{border-color:var(--acc);color:var(--acc);background:rgba(0,191,165,.1)}
/* BUTTONS */
.btn{padding:12px 20px;border-radius:8px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:.15s;width:100%}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:active{background:var(--acc2)}
.btn-sm{padding:7px 14px;font-size:13px;width:auto;border-radius:7px}
.btn-danger{background:rgba(255,82,82,.15);color:var(--red);border:1px solid rgba(255,82,82,.25)}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--tx2)}
/* BALANCE CARDS */
.bal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.bal-card{border-radius:var(--r);padding:14px 10px;text-align:center;border:1px solid var(--bdr)}
.bal-card .bl{font-size:11px;font-weight:600;margin-bottom:6px;letter-spacing:.3px}
.bal-card .bv{font-size:16px;font-weight:800;word-break:break-all}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--sf);border-radius:var(--r);padding:12px 8px;text-align:center;border:1px solid var(--bdr)}
.stat-card .sl{font-size:11px;color:var(--tx2);margin-bottom:4px}
.stat-card .sv{font-size:15px;font-weight:700;word-break:break-all}
/* RECORD ITEM */
.ri{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bdr)}
.ri:last-child{border-bottom:none}
.ri-cat{font-size:13px;font-weight:500}
.ri-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.ri-amt{font-size:15px;font-weight:700}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;margin-left:4px;vertical-align:middle}
/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--sf);border-radius:var(--r);padding:10px 16px;border:1px solid var(--bdr)}
.month-nav button{background:none;border:none;color:var(--acc);font-size:22px;cursor:pointer;padding:0 6px;line-height:1}
.month-nav span{font-size:17px;font-weight:700}
/* CHART */
.chart-wrap{position:relative;height:210px;margin-bottom:4px}
/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--acc);color:#fff;padding:10px 24px;border-radius:30px;font-size:14px;font-weight:600;z-index:999;transition:.3s;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
/* CARD TABS */
.card-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.card-tabs::-webkit-scrollbar{display:none}
.ctab{padding:7px 16px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.15s}
.ctab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
/* PROGRESS */
.prog{background:var(--card);border-radius:4px;height:6px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;background:var(--acc);border-radius:4px;transition:.4s}
/* SUMMARY TABLE */
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl th{color:var(--tx2);font-weight:600;padding:6px 6px;text-align:left;border-bottom:1px solid var(--bdr);font-size:12px}
.stbl td{padding:8px 6px;border-bottom:1px solid var(--bdr)}
.stbl tr:last-child td{border-bottom:none}
/* MISC */
.empty{text-align:center;color:var(--tx2);padding:28px;font-size:14px}
.c-grn{color:var(--grn)}.c-red{color:var(--red)}.c-org{color:var(--org)}.c-acc{color:var(--acc)}.c-pur{color:var(--purple)}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:5px 12px;font-size:13px;margin:3px}
.chip button{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:15px;padding:0;line-height:1}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row .fg{flex:1;margin-bottom:0}
/* LOADING */
#loading{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:500}
.spinner{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@media(max-width:380px){.stat-card .sv{font-size:13px}.form-row{grid-template-columns:1fr}.bal-card .bv{font-size:13px}}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:var(--sf);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:600px;padding:20px 16px 32px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-title button{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1}
.rec-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}
.rec-actions button{background:none;border:none;cursor:pointer;font-size:12px;padding:3px 7px;border-radius:5px}
.btn-edit-rec{color:var(--acc);border:1px solid rgba(0,191,165,.3)!important}
.btn-del-rec{color:var(--red);border:1px solid rgba(255,82,82,.3)!important}
</style>
</head>
<body>

<div id="loading" style="display:none"><div class="spinner"></div></div>
<div id="toast"></div>

<!-- 編輯紀錄 Modal -->
<div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEdit()">
  <div class="modal-box">
    <div class="modal-title">編輯紀錄<button onclick="closeEdit()">✕</button></div>
    <div class="mode-row" id="ed-mode-row">
      <div class="mode-btn" id="edm-income" onclick="setEditMode('income')">收入</div>
      <div class="mode-btn" id="edm-cash" onclick="setEditMode('cash')">現金消費</div>
      <div class="mode-btn" id="edm-credit" onclick="setEditMode('credit')">刷卡消費</div>
      <div class="mode-btn" id="edm-transfer" onclick="setEditMode('transfer')">資金轉移</div>
    </div>
    <div class="form-row">
      <div class="fg"><label>日期</label><input type="date" id="ed-date"></div>
      <div class="fg"><label>金額 (NT$)</label><input type="number" id="ed-amt" placeholder="0" min="0" inputmode="decimal"></div>
    </div>
    <div class="fg" id="ed-cat-row"><label>類別</label><select id="ed-cat"></select></div>
    <div id="ed-credit-sec" style="display:none">
      <div class="fg"><label>信用卡</label><select id="ed-card"></select></div>
    </div>
    <div id="ed-transfer-sec" style="display:none">
      <div class="form-row">
        <div class="fg"><label>從</label>
          <select id="ed-from">
            <option value="account">帳戶</option>
            <option value="wallet">錢包</option>
            <option value="piggy">存錢筒</option>
            <option value="box">公費箱</option>
          </select>
        </div>
        <div class="fg"><label>到</label>
          <select id="ed-to">
            <option value="wallet">錢包</option>
            <option value="account">帳戶</option>
            <option value="piggy">存錢筒</option>
            <option value="box">公費箱</option>
          </select>
        </div>
      </div>
    </div>
    <div class="fg"><label>備註（選填）</label><textarea id="ed-note" placeholder="輸入備註..."></textarea></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-danger" style="flex:1" onclick="delRecFromEdit()">刪除此筆</button>
      <button class="btn btn-acc" style="flex:2" onclick="saveEdit()">儲存修改</button>
    </div>
  </div>
</div>

<!-- ═══ 記帳 ════════════════════════════════════════════ -->
<div id="pg-entry" class="pg on">
  <div class="card">
    <div class="mode-row" id="entry-mode-row">
      <div class="mode-btn on" id="m-income" onclick="setMode('income')">收入</div>
      <div class="mode-btn" id="m-cash" onclick="setMode('cash')">現金消費</div>
      <div class="mode-btn" id="m-credit" onclick="setMode('credit')">刷卡消費</div>
      <div class="mode-btn" id="m-transfer" onclick="setMode('transfer')">資金轉移</div>
    </div>
    <div class="form-row">
      <div class="fg"><label>日期</label><input type="date" id="e-date"></div>
      <div class="fg"><label>金額 (NT$)</label><input type="number" id="e-amt" placeholder="0" min="0" inputmode="decimal"></div>
    </div>
    <!-- 類別（收入/現金消費/刷卡消費顯示） -->
    <div class="fg" id="e-cat-row"><label>類別</label><select id="e-cat"></select></div>
    <!-- 刷卡消費專區 -->
    <div id="e-credit-sec" style="display:none">
      <div class="fg"><label>信用卡</label><select id="e-card"></select></div>
      <div class="fg">
        <label>付款類型</label>
        <div class="pay-row">
          <div class="pay-opt on" id="pay-lump" onclick="setPayType('lump')">付清</div>
          <div class="pay-opt" id="pay-inst" onclick="setPayType('inst')">分期</div>
          <div class="pay-opt" id="pay-recurring" onclick="setPayType('recurring')">每月固定</div>
        </div>
      </div>
      <div id="inst-section" style="display:none">
        <div class="fg"><label>分期期數</label><input type="number" id="e-inst" placeholder="例：6" min="2" inputmode="numeric"></div>
      </div>
      <div id="recurring-section" style="display:none">
        <div class="fg"><label>起始月份</label><input type="month" id="e-rec-start"></div>
      </div>
    </div>
    <!-- 資金轉移專區 -->
    <div id="e-transfer-sec" style="display:none">
      <div class="form-row">
        <div class="fg"><label>從</label>
          <select id="e-from">
            <option value="account">帳戶</option>
            <option value="wallet">錢包</option>
            <option value="piggy">存錢筒</option>
            <option value="box">公費箱</option>
          </select>
        </div>
        <div class="fg"><label>到</label>
          <select id="e-to">
            <option value="wallet">錢包</option>
            <option value="account">帳戶</option>
            <option value="piggy">存錢筒</option>
            <option value="box">公費箱</option>
          </select>
        </div>
      </div>
    </div>
    <div class="fg"><label>備註（選填）</label><textarea id="e-note" placeholder="輸入備註..."></textarea></div>
    <button class="btn btn-acc" onclick="saveRecord()">儲存</button>
  </div>
  <div class="card">
    <div class="card-title">最近10筆記錄</div>
    <div id="recent-list"><div class="empty">尚無記錄</div></div>
  </div>
</div>

<!-- ═══ 總覽 ════════════════════════════════════════════ -->
<div id="pg-overview" class="pg">
  <!-- 四個餘額 -->
  <div class="bal-grid">
    <div class="bal-card" style="background:rgba(0,191,165,.08);border-color:rgba(0,191,165,.25)">
      <div class="bl c-acc">帳　戶</div>
      <div class="bv c-acc" id="bal-account">NT$0</div>
    </div>
    <div class="bal-card" style="background:rgba(255,183,77,.08);border-color:rgba(255,183,77,.25)">
      <div class="bl c-org">錢　包</div>
      <div class="bv c-org" id="bal-wallet">NT$0</div>
    </div>
    <div class="bal-card" style="background:rgba(206,147,216,.08);border-color:rgba(206,147,216,.25);position:relative">
      <div class="bl c-pur">存錢筒</div>
      <div class="bv c-pur" id="bal-piggy">NT$0</div>
      <button onclick="resetBucket('piggy')" style="position:absolute;top:6px;right:6px;background:rgba(255,82,82,.15);border:1px solid rgba(255,82,82,.3);color:var(--red);border-radius:5px;font-size:10px;padding:2px 6px;cursor:pointer;font-weight:600">清空</button>
    </div>
    <div class="bal-card" style="background:rgba(255,138,101,.08);border-color:rgba(255,138,101,.25);position:relative">
      <div class="bl" style="color:var(--coral)">公費箱</div>
      <div class="bv" style="color:var(--coral)" id="bal-box">NT$0</div>
      <button onclick="resetBucket('box')" style="position:absolute;top:6px;right:6px;background:rgba(255,82,82,.15);border:1px solid rgba(255,82,82,.3);color:var(--red);border-radius:5px;font-size:10px;padding:2px 6px;cursor:pointer;font-weight:600">清空</button>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="chMonth(-1)">&#8249;</button>
    <span id="ov-label"></span>
    <button onclick="chMonth(1)">&#8250;</button>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="sl">本月收入</div><div class="sv c-grn" id="ov-in">NT$0</div></div>
    <div class="stat-card"><div class="sl">現金支出</div><div class="sv c-red" id="ov-out">NT$0</div></div>
    <div class="stat-card"><div class="sl">刷卡消費</div><div class="sv c-org" id="ov-cr">NT$0</div></div>
  </div>
  <div class="card">
    <div class="card-title">現金支出分類</div>
    <div class="chart-wrap" id="pie-wrap"><canvas id="pie-chart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">每日現金支出</div>
    <div class="chart-wrap" id="bar-wrap"><canvas id="bar-chart"></canvas></div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="card-title" style="margin:0" id="ov-list-title">當月紀錄</div>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="date" id="ov-date-pick" style="background:var(--card);border:1px solid var(--bdr);color:var(--tx);border-radius:8px;padding:5px 8px;font-size:13px;outline:none" onchange="filterByDate(this.value)">
        <button class="btn btn-ghost btn-sm" id="ov-date-clear" style="display:none;padding:5px 10px;font-size:12px" onclick="clearDateFilter()">✕ 清除</button>
      </div>
    </div>
    <div id="ov-list"><div class="empty">尚無記錄</div></div>
  </div>
</div>

<!-- ═══ 信用卡 ══════════════════════════════════════════ -->
<div id="pg-credit" class="pg">
  <div id="cr-empty" class="empty" style="display:none">尚未新增信用卡<br>請前往設定頁面新增</div>
  <div id="cr-main" style="display:none">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <button id="cr-all-btn" class="ctab" onclick="selCard(-1)">全部</button>
      <select id="cr-tabs" onchange="selCard(parseInt(this.value))" style="flex:1;background:var(--card);border:1px solid var(--bdr);color:var(--tx);border-radius:8px;padding:8px 12px;font-size:14px;outline:none;-webkit-appearance:none"></select>
    </div>
    <!-- 全部卡片總覽 -->
    <div id="cr-all-view" style="display:none">
      <div class="card">
        <div class="card-title">本期各卡應繳</div>
        <div id="cr-all-billing"></div>
      </div>
      <div class="card">
        <div class="card-title">未結清分期（所有卡）</div>
        <div id="cr-all-inst"></div>
      </div>
      <div class="card">
        <div class="card-title">每月固定扣款（所有卡）</div>
        <div id="cr-all-recurring"></div>
      </div>
      <div class="card">
        <div class="card-title">未來 12 個月分期規劃</div>
        <div id="cr-all-schedule"></div>
      </div>
    </div>
    <!-- 單張卡片 -->
    <div id="cr-card-view">
      <div class="card">
        <div class="card-title">篩選期間</div>
        <div class="form-row">
          <div class="fg"><label>起始年月</label><input type="month" id="cr-from"></div>
          <div class="fg"><label>結束年月</label><input type="month" id="cr-to"></div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="renderCreditCard()">套用</button>
      </div>
      <div class="card"><div class="card-title">本期帳單</div><div id="cr-billing"></div></div>
      <div class="card"><div class="card-title">消費明細</div><div id="cr-detail"></div></div>
      <div class="card"><div class="card-title">分期追蹤</div><div id="cr-inst"></div></div>
      <div class="card"><div class="card-title">每月固定扣款</div><div id="cr-recurring"></div></div>
      <div class="card"><div class="card-title">每月應繳摘要</div><div id="cr-monthly"></div></div>
      <button class="btn btn-ghost" style="margin-bottom:12px" onclick="exportExcel()">📊 匯出 Excel</button>
    </div>
  </div>
</div>

<!-- ═══ 設定 ════════════════════════════════════════════ -->
<div id="pg-settings" class="pg">
  <div class="card">
    <div class="card-title">JSONBin 設定</div>
    <div class="fg"><label>API Key (X-Master-Key)</label><input type="password" id="s-key" placeholder="$2a$10$..."></div>
    <div class="fg">
      <label>Bin ID</label>
      <div class="input-row">
        <div class="fg"><input type="text" id="s-bin" placeholder="輸入 Bin ID 或點擊建立"></div>
        <button class="btn btn-ghost btn-sm" onclick="createBin()">建立新 Bin</button>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-acc" style="flex:1" onclick="saveCfg()">儲存設定</button>

<script>
'use strict';
const DEF_CATS=['餐飲','交通','購物','娛樂','醫療','居家','其他','薪資','獎金'];
const CAT_COLORS=['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40','#FF6B6B','#45B7D1','#96CEB4','#FFEAA7'];
const BUCKET_LABEL={account:'帳戶',wallet:'錢包',piggy:'存錢筒',box:'公費箱'};

let D={cards:[],categories:[...DEF_CATS],records:[],recurring:[],resets:[]};
let CFG={apiKey:'',binId:''};
let entryMode='income';
let isInstall=false;
let isRecurring=false;
let ovYm=ymStr(new Date());
let crCardIdx=-1;
let pieChart=null, barChart=null;
let editId=null, editMode='income';

// ── Utils ──────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function nt(n){ return 'NT$'+Math.abs(Math.round(n)).toLocaleString(); }
function ntBal(n){ return (n<0?'-':'')+'NT$'+Math.abs(Math.round(n)).toLocaleString(); }
function ymStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function ymLabel(ym){ const[y,m]=ym.split('-'); return y+'年'+parseInt(m)+'月'; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function addMonths(ym,n){ const[y,m]=ym.split('-').map(Number); const d=new Date(y,m-1+n,1); return ymStr(d); }
function monthDiff(a,b){ const[ay,am]=a.split('-').map(Number); const[by,bm]=b.split('-').map(Number); return (by-ay)*12+(bm-am); }
function tip(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=ok?'var(--acc)':'var(--red)';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}
function loading(v){ document.getElementById('loading').style.display=v?'flex':'none'; }
function billYmFor(dateStr,billDay){
  const d=new Date(dateStr);
  if(d.getDate()<=billDay) return ymStr(d);
  return addMonths(ymStr(d),1);
}
function billPeriod(ym,billDay){
  const[y,m]=ym.split('-').map(Number);
  const end=new Date(y,m-1,billDay);
  const start=new Date(y,m-2,billDay+1);
  return{start,end,ss:start.toISOString().slice(0,10),es:end.toISOString().slice(0,10)};
}

// ── Migration: normalize old-format records ──────────────────────────────
function migrateRecord(r){
  if(r.type==='transfer'||r.type==='income'||r.type==='cash'||r.type==='credit'){
    if((r.amount||0)<0) return {...r,amount:Math.abs(r.amount)};
    return r;
  }
  if(r.type==='expense'){
    const amt=Math.abs(r.amount||0);
    if(r.paymentMethod==='credit'||r.cardId) return {...r,type:'credit',amount:amt};
    return {...r,type:'cash',from:'wallet',amount:amt};
  }
  return r;
}
function migrateAll(){ D.records=D.records.map(migrateRecord); }

// ── Balance calculation ─────────────────────────────────────────────────
function getBalances(){
  let account=0,wallet=0,piggy=0,box=0;
  D.records.forEach(r=>{
    const amt=r.amount||0;
    if(r.type==='income') account+=amt;
    else if(r.type==='cash') wallet-=amt;
    else if(r.type==='transfer'){
      const f=r.from||'account', t=r.to||'wallet';
      if(f==='account') account-=amt; else if(f==='wallet') wallet-=amt; else if(f==='piggy') piggy-=amt; else if(f==='box') box-=amt;
      if(t==='account') account+=amt; else if(t==='wallet') wallet+=amt; else if(t==='piggy') piggy+=amt; else if(t==='box') box+=amt;
    }
  });
  if(D.resets) D.resets.forEach(rs=>{
    if(rs.bucket==='piggy') piggy-=rs.amount;
    else if(rs.bucket==='box') box-=rs.amount;
  });
  return{account,wallet,piggy,box};
}

// ── Storage ────────────────────────────────────────────────────────────
function localSave(){ try{ localStorage.setItem('acct_d',JSON.stringify(D)); }catch(e){} }
function localLoad(){ const s=localStorage.getItem('acct_d'); if(s) try{ D={...D,...JSON.parse(s)}; migrateAll(); }catch(e){} }
function cfgSave(){ localStorage.setItem('acct_c',JSON.stringify(CFG)); }
function cfgLoad(){ const s=localStorage.getItem('acct_c'); if(s) try{ CFG={...CFG,...JSON.parse(s)}; }catch(e){} }

// ── JSONBin ────────────────────────────────────────────────────────────
async function loadData(showTip){
  if(!CFG.apiKey||!CFG.binId){ localLoad(); return; }
  loading(true);
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG.binId}/latest`,{headers:{'X-Master-Key':CFG.apiKey}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    D={cards:[],categories:[...DEF_CATS],records:[],recurring:[],resets:[],...j.record};
    if(!D.categories.length) D.categories=[...DEF_CATS];
    migrateAll();
    localSave();
    if(showTip) tip(`✓ 已同步：${D.cards.length}張卡，${D.records.length}筆紀錄`);
  }catch(e){ localLoad(); tip('⚠ 雲端載入失敗，使用本機快取',false); console.warn('JSONBin load:',e.message); }
  loading(false);
}
async function saveData(){
  localSave();
  if(!CFG.apiKey||!CFG.binId) return;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG.binId}`,{
      method:'PUT',headers:{'X-Master-Key':CFG.apiKey,'Content-Type':'application/json'},body:JSON.stringify(D)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
  }catch(e){ tip('雲端儲存失敗，已存本機',false); }
}
async function createBin(){
  CFG.apiKey=document.getElementById('s-key').value.trim();
  if(!CFG.apiKey){ tip('請先輸入 API Key',false); return; }
  loading(true);
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b',{
      method:'POST',
      headers:{'X-Master-Key':CFG.apiKey,'Content-Type':'application/json','X-Bin-Name':'Personal-Accounting'},
      body:JSON.stringify(D)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    CFG.binId=j.metadata.id; cfgSave();
    document.getElementById('s-bin').value=CFG.binId;
    tip('✓ 已建立 Bin：'+CFG.binId);
  }catch(e){ tip('建立失敗：'+e.message,false); }
  loading(false);
}
async function testConn(){
  const key=document.getElementById('s-key').value.trim();
  const bid=document.getElementById('s-bin').value.trim();
  if(!key||!bid){ tip('請先填入 API Key 和 Bin ID',false); return; }
  loading(true);
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${bid}/latest`,{headers:{'X-Master-Key':key}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json(); const rec=j.record||{};
    tip(`✓ 連線成功｜${(rec.cards||[]).length}張卡，${(rec.records||[]).length}筆紀錄`);
  }catch(e){ tip('連線失敗：'+e.message,false); }
  loading(false);
}

// ── Navigation ─────────────────────────────────────────────────────────
function goTab(tab,el){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+tab).classList.add('on');
  el.classList.add('on');
  if(tab==='overview') renderOverview();
  if(tab==='credit') renderCreditPage();
  if(tab==='settings') renderSettings();
}

// ── Entry Page ─────────────────────────────────────────────────────────
function setMode(m){
  entryMode=m;
  ['income','cash','credit','transfer'].forEach(x=>{
    document.getElementById('m-'+x).classList.toggle('on',x===m);
  });
  document.getElementById('e-cat-row').style.display=m==='transfer'?'none':'block';
  document.getElementById('e-credit-sec').style.display=m==='credit'?'block':'none';
  document.getElementById('e-transfer-sec').style.display=m==='transfer'?'block':'none';
  if(m!=='credit'){
    isInstall=false; isRecurring=false;
    document.getElementById('inst-section').style.display='none';
    document.getElementById('recurring-section').style.display='none';
  }
  rebuildCatSelect();
}
function setPayType(t){
  isInstall=t==='inst';
  isRecurring=t==='recurring';
  ['lump','inst','recurring'].forEach(x=>document.getElementById('pay-'+x).classList.toggle('on',x===t));
  document.getElementById('inst-section').style.display=isInstall?'block':'none';
  document.getElementById('recurring-section').style.display=isRecurring?'block':'none';
  if(isRecurring){
    const el=document.getElementById('e-rec-start');
    if(!el.value) el.value=ymStr(new Date());
  }
}
function rebuildCatSelect(){
  document.getElementById('e-cat').innerHTML=D.categories.map(c=>`<option>${c}</option>`).join('');
}
function rebuildCardSelect(){
  const sel=document.getElementById('e-card');
  if(!D.cards.length){ sel.innerHTML='<option value="">（請先在設定新增信用卡）</option>'; return; }
  sel.innerHTML=D.cards.map(c=>`<option value="${c.id}">${c.name}（${c.billingDate}號）</option>`).join('');
}
function renderRecent(){
  const sorted=[...D.records].sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id))).slice(0,10);
  const el=document.getElementById('recent-list');
  if(!sorted.length){ el.innerHTML='<div class="empty">尚無記錄</div>'; return; }
  el.innerHTML=sorted.map(r=>recHtml(r)).join('');
}

function recHtml(r){
  const actions=`<div class="rec-actions"><button class="btn-edit-rec" onclick="openEdit('${r.id}')">✏ 編輯</button><button class="btn-del-rec" onclick="delRec('${r.id}')">🗑 刪除</button></div>`;
  if(r.type==='income'){
    return `<div class="ri">
      <div style="flex:1;min-width:0">
        <div class="ri-cat">${r.category||'收入'}<span class="badge" style="background:rgba(105,240,174,.15);color:var(--grn)">→帳戶</span></div>
        <div class="ri-sub">${r.date}${r.note?' · '+r.note:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="ri-amt c-grn">+${nt(r.amount)}</div>${actions}
      </div>
    </div>`;
  }
  if(r.type==='cash'){
    return `<div class="ri">
      <div style="flex:1;min-width:0">
        <div class="ri-cat">${r.category||'支出'}<span class="badge" style="background:rgba(255,183,77,.15);color:var(--org)">現金</span></div>
        <div class="ri-sub">${r.date}${r.note?' · '+r.note:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="ri-amt c-red">-${nt(r.amount)}</div>${actions}
      </div>
    </div>`;
  }
  if(r.type==='credit'){
    const cardName=r.cardId?(D.cards.find(c=>c.id===r.cardId)?.name||''):'';
    const badgeTxt=r.installment?`分${r.installmentTotal}期`:'刷卡';
    const badgeColor=r.installment?'rgba(255,183,77,.2)':'rgba(0,191,165,.15)';
    const badgeTColor=r.installment?'var(--org)':'var(--acc)';
    return `<div class="ri">
      <div style="flex:1;min-width:0">
        <div class="ri-cat">${r.category||'消費'}<span class="badge" style="background:${badgeColor};color:${badgeTColor}">${badgeTxt}</span></div>
        <div class="ri-sub">${r.date}${cardName?' · '+cardName:''}${r.note?' · '+r.note:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="ri-amt c-red">-${nt(r.amount)}</div>${actions}
      </div>
    </div>`;
  }
  if(r.type==='transfer'){
    const fl=BUCKET_LABEL[r.from]||r.from, tl=BUCKET_LABEL[r.to]||r.to;
    return `<div class="ri">
      <div style="flex:1;min-width:0">
        <div class="ri-cat" style="color:var(--purple)">${fl} → ${tl}</div>
        <div class="ri-sub">${r.date}${r.note?' · '+r.note:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="ri-amt c-pur">${nt(r.amount)}</div>${actions}
      </div>
    </div>`;
  }
  return '';
}

async function saveRecord(){
  const date=document.getElementById('e-date').value;
  const amt=parseFloat(document.getElementById('e-amt').value);
  if(!date){ tip('請選擇日期',false); return; }
  if(!amt||amt<=0){ tip('請輸入有效金額',false); return; }
  const cat=document.getElementById('e-cat').value;
  const note=document.getElementById('e-note').value.trim();
  let rec={id:uid(),date,amount:amt,note,type:entryMode};

  if(entryMode==='income'||entryMode==='cash'){
    rec.category=cat;
    if(entryMode==='income') rec.to='account';
    else rec.from='wallet';
  } else if(entryMode==='credit'){
    const cardSel=document.getElementById('e-card');
    if(!cardSel.value){ tip('請選擇信用卡',false); return; }
    if(isRecurring){
      const startYm=document.getElementById('e-rec-start').value||ymStr(new Date());
      if(!D.recurring) D.recurring=[];
      D.recurring.push({id:uid(),name:cat,cardId:cardSel.value,amount:amt,category:cat,startYm,note});
      loading(true); await saveData(); loading(false);
      tip('✓ 已新增每月固定扣款');
      document.getElementById('e-amt').value='';
      document.getElementById('e-note').value='';
      setPayType('lump');
      renderRecent(); updateBalanceCards();
      return;
    }
    rec.category=cat;
    rec.cardId=cardSel.value;
    rec.installment=isInstall;
    rec.installmentTotal=0;
    if(isInstall){
      const n=parseInt(document.getElementById('e-inst').value);
      if(!n||n<2){ tip('分期期數至少 2 期',false); return; }
      rec.installmentTotal=n;
    }
  } else if(entryMode==='transfer'){
    const from=document.getElementById('e-from').value;
    const to=document.getElementById('e-to').value;
    if(from===to){ tip('轉出和轉入不能相同',false); return; }
    rec.from=from; rec.to=to;
  }

  D.records.push(rec);
  loading(true); await saveData(); loading(false);
  tip('✓ 已儲存');
  document.getElementById('e-amt').value='';
  document.getElementById('e-note').value='';
  document.getElementById('e-date').value=todayStr();
  renderRecent();
  updateBalanceCards();
}

async function delRec(id){
  if(!confirm('確定刪除此筆記錄？')) return;
  D.records=D.records.filter(r=>r.id!==id);
  loading(true); await saveData(); loading(false);
  tip('已刪除');
  refreshCurrentView();
}

// ── Edit Modal ─────────────────────────────────────────────────────────
function setEditMode(m){
  editMode=m;
  ['income','cash','credit','transfer'].forEach(x=>{
    document.getElementById('edm-'+x).classList.toggle('on',x===m);
  });
  document.getElementById('ed-cat-row').style.display=m==='transfer'?'none':'block';
  document.getElementById('ed-credit-sec').style.display=m==='credit'?'block':'none';
  document.getElementById('ed-transfer-sec').style.display=m==='transfer'?'block':'none';
}
function openEdit(id){
  const r=D.records.find(r=>r.id===id); if(!r) return;
  editId=id;
  const m=r.type||'cash';
  editMode=m;
  setEditMode(m);
  document.getElementById('ed-date').value=r.date;
  document.getElementById('ed-amt').value=r.amount;
  const catSel=document.getElementById('ed-cat');
  catSel.innerHTML=D.categories.map(c=>`<option value="${c}"${c===r.category?' selected':''}>${c}</option>`).join('');
  if(m==='credit'){
    const cardSel=document.getElementById('ed-card');
    cardSel.innerHTML=D.cards.map(c=>`<option value="${c.id}"${c.id===r.cardId?' selected':''}>${c.name}</option>`).join('');
  }
  if(m==='transfer'){
    document.getElementById('ed-from').value=r.from||'account';
    document.getElementById('ed-to').value=r.to||'wallet';
  }
  document.getElementById('ed-note').value=r.note||'';
  document.getElementById('edit-modal').style.display='flex';
}
function closeEdit(){
  document.getElementById('edit-modal').style.display='none';
  editId=null;
}
async function saveEdit(){
  if(!editId) return;
  const idx=D.records.findIndex(r=>r.id===editId); if(idx<0) return;
  const date=document.getElementById('ed-date').value;
  const amt=parseFloat(document.getElementById('ed-amt').value);
  if(!date||!amt||amt<=0){ tip('請填寫日期和金額',false); return; }
  const note=document.getElementById('ed-note').value.trim();
  let updated={...D.records[idx],date,amount:amt,note,type:editMode};
  if(editMode==='income'||editMode==='cash'){
    updated.category=document.getElementById('ed-cat').value;
    if(editMode==='income') updated.to='account';
    else updated.from='wallet';
  } else if(editMode==='credit'){
    updated.category=document.getElementById('ed-cat').value;
    updated.cardId=document.getElementById('ed-card').value||'';
  } else if(editMode==='transfer'){
    const from=document.getElementById('ed-from').value;
    const to=document.getElementById('ed-to').value;
    if(from===to){ tip('轉出和轉入不能相同',false); return; }
    updated.from=from; updated.to=to;
  }
  D.records[idx]=updated;
  loading(true); await saveData(); loading(false);
  tip('✓ 已更新'); closeEdit(); refreshCurrentView();
}
async function delRecFromEdit(){
  if(!editId) return;
  if(!confirm('確定刪除此筆記錄？')) return;
  D.records=D.records.filter(r=>r.id!==editId);
  loading(true); await saveData(); loading(false);
  tip('已刪除'); closeEdit(); refreshCurrentView();
}
function refreshCurrentView(){
  updateBalanceCards();
  const datePick=document.getElementById('ov-date-pick').value;
  if(document.getElementById('pg-overview').classList.contains('on')){
    const recs=D.records.filter(r=>r.date.slice(0,7)===ovYm);
    drawPie(recs); drawBar(recs);
    if(datePick) renderDayList(datePick); else clearDateFilter();
  }
  renderRecent();
}

// ── Overview Page ──────────────────────────────────────────────────────
function updateBalanceCards(){
  const b=getBalances();
  const setBal=(id,val)=>{
    const el=document.getElementById(id);
    el.textContent=ntBal(val);
    el.style.color=val<0?'var(--red)':'';
  };
  setBal('bal-account',b.account);
  setBal('bal-wallet',b.wallet);
  setBal('bal-piggy',b.piggy);
  setBal('bal-box',b.box);
}
async function resetBucket(bucket){
  const label=BUCKET_LABEL[bucket]||bucket;
  const b=getBalances();
  const cur=b[bucket]||0;
  if(!confirm(`確定清空${label}？\n目前餘額 ${ntBal(cur)}，清空後歸零且不列入計算。`)) return;
  D.resets=D.resets||[];
  D.resets.push({bucket,amount:cur,date:todayStr()});
  await saveData();
  updateBalanceCards();
  tip(`${label} 已清空`);
}
function chMonth(d){ const[y,m]=ovYm.split('-').map(Number); const nd=new Date(y,m-1+d,1); ovYm=ymStr(nd); renderOverview(); }
function renderOverview(){
  updateBalanceCards();
  document.getElementById('ov-label').textContent=ymLabel(ovYm);
  const recs=D.records.filter(r=>r.date.slice(0,7)===ovYm);
  const inc=recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const cash=recs.filter(r=>r.type==='cash').reduce((s,r)=>s+r.amount,0);
  const cr=recs.filter(r=>r.type==='credit').reduce((s,r)=>s+r.amount,0)
    +(D.recurring||[]).filter(r=>r.startYm<=ovYm).reduce((s,r)=>s+r.amount,0);
  document.getElementById('ov-in').textContent=nt(inc);
  document.getElementById('ov-out').textContent=nt(cash);
  document.getElementById('ov-cr').textContent=nt(cr);
  drawPie(recs); drawBar(recs);
  clearDateFilter();
}
function renderDayList(dateStr){
  const recs=D.records.filter(r=>r.date===dateStr).sort((a,b)=>String(b.id).localeCompare(String(a.id)));
  const[,m,d]=dateStr.split('-');
  document.getElementById('ov-list-title').textContent=`${parseInt(m)}月${parseInt(d)}日 紀錄`;
  document.getElementById('ov-date-clear').style.display='';
  document.getElementById('ov-date-pick').value=dateStr;
  const el=document.getElementById('ov-list');
  if(!recs.length){ el.innerHTML='<div class="empty">當日無記錄</div>'; return; }
  const total=recs.filter(r=>r.type==='cash').reduce((s,r)=>s+r.amount,0);
  el.innerHTML=recs.map(r=>recHtml(r)).join('')+
    (total?`<div style="text-align:right;padding:8px 0;font-size:13px;color:var(--tx2)">當日現金支出：<span style="color:var(--red);font-weight:700">${nt(total)}</span></div>`:'');
}
function filterByDate(val){
  if(!val){ clearDateFilter(); return; }
  ovYm=val.slice(0,7);
  document.getElementById('ov-label').textContent=ymLabel(ovYm);
  const recs=D.records.filter(r=>r.date.slice(0,7)===ovYm);
  drawPie(recs); drawBar(recs);
  renderDayList(val);
}
function clearDateFilter(){
  document.getElementById('ov-list-title').textContent='當月紀錄';
  document.getElementById('ov-date-clear').style.display='none';
  document.getElementById('ov-date-pick').value='';
  const recs=D.records.filter(r=>r.date.slice(0,7)===ovYm).sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id)));
  const el=document.getElementById('ov-list');
  el.innerHTML=recs.length?recs.map(r=>recHtml(r)).join(''):'<div class="empty">本月無記錄</div>';
}
function drawPie(recs){
  const map={};
  recs.filter(r=>r.type==='cash').forEach(r=>{ map[r.category]=(map[r.category]||0)+r.amount; });
  const labels=Object.keys(map);
  const wrap=document.getElementById('pie-wrap');
  wrap.innerHTML='<canvas id="pie-chart"></canvas>';
  if(!labels.length){ wrap.innerHTML='<div class="empty" style="height:210px;display:flex;align-items:center;justify-content:center">本月無現金支出</div>'; return; }
  pieChart=new Chart(document.getElementById('pie-chart'),{
    type:'doughnut',
    data:{labels,datasets:[{data:labels.map(l=>map[l]),backgroundColor:CAT_COLORS.slice(0,labels.length),borderWidth:0,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'bottom',labels:{color:'#9e9e9e',font:{size:11},padding:8,boxWidth:12}}}}
  });
}
function drawBar(recs){
  const[y,m]=ovYm.split('-').map(Number);
  const days=new Date(y,m,0).getDate();
  const daily={};
  recs.filter(r=>r.type==='cash').forEach(r=>{ const d=parseInt(r.date.slice(8)); daily[d]=(daily[d]||0)+r.amount; });
  const labels=Array.from({length:days},(_,i)=>i+1);
  const wrap=document.getElementById('bar-wrap');
  wrap.innerHTML='<canvas id="bar-chart"></canvas>';
  barChart=new Chart(document.getElementById('bar-chart'),{
    type:'bar',
    data:{labels,datasets:[{label:'現金支出',data:labels.map(d=>daily[d]||0),backgroundColor:'rgba(0,191,165,.55)',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:([i])=>`${parseInt(ovYm.split('-')[1])}月${i.label}日`,label:c=>'NT$'+c.raw.toLocaleString()}}},
      scales:{x:{ticks:{color:'#9e9e9e',font:{size:9},maxRotation:0},grid:{display:false}},
              y:{ticks:{color:'#9e9e9e',font:{size:10},callback:v=>v?'NT$'+v.toLocaleString():''},grid:{color:'rgba(255,255,255,.04)'}}},
      onClick:(_,els)=>{
        if(!els.length) return;
        const day=String(els[0].index+1).padStart(2,'0');
        const dateStr=`${ovYm}-${day}`;
        document.getElementById('ov-date-pick').value=dateStr;
        renderDayList(dateStr);
      }
    }
  });
}

// ── Credit Card Page ────────────────────────────────────────────────────
function isCreditRec(r,cardId){ return (r.type==='credit'||(r.type==='expense'&&(r.paymentMethod==='credit'||r.cardId)))&&r.cardId===cardId; }

function renderCreditPage(){
  if(!D.cards.length){
    document.getElementById('cr-empty').style.display='block';
    document.getElementById('cr-main').style.display='none'; return;
  }
  document.getElementById('cr-empty').style.display='none';
  document.getElementById('cr-main').style.display='block';
  document.getElementById('cr-tabs').innerHTML=
    `<option value="" disabled>選擇卡片…</option>`+D.cards.map((c,i)=>`<option value="${i}">${c.name}</option>`).join('');
  if(crCardIdx===-1){
    document.getElementById('cr-all-btn').classList.add('on');
    document.getElementById('cr-tabs').value='';
  } else {
    document.getElementById('cr-all-btn').classList.remove('on');
    document.getElementById('cr-tabs').value=String(crCardIdx);
  }
  if(!document.getElementById('cr-from').value){
    document.getElementById('cr-from').value=addMonths(ymStr(new Date()),-2);
    document.getElementById('cr-to').value=ymStr(new Date());
  }
  document.getElementById('cr-all-view').style.display=crCardIdx===-1?'block':'none';
  document.getElementById('cr-card-view').style.display=crCardIdx===-1?'none':'block';
  if(crCardIdx===-1) renderAllCards(); else renderCreditCard();
}
function selCard(i){
  crCardIdx=i;
  if(i===-1){
    document.getElementById('cr-all-btn').classList.add('on');
    document.getElementById('cr-tabs').value='';
  } else {
    document.getElementById('cr-all-btn').classList.remove('on');

  if(i===-1) renderAllCards(); else renderCreditCard();
}
function renderAllCards(){
  const nowYm=ymStr(new Date());

  D.cards.forEach(card=>{
    const allCard=D.records.filter(r=>isCreditRec(r,card.id));

    const billingYm=now.getDate()<=card.billingDate?nowYm:addMonths(nowYm,1);
    const p=billPeriod(billingYm,card.billingDate);
    const lump=allCard.filter(r=>!r.installment&&r.date>=p.ss&&r.date<=p.es).reduce((s,r)=>s+r.amount,0);
    const inst=instPaymentsForYm(allCard.filter(r=>r.installment),card,billingYm).reduce((s,x)=>s+x.amt,0);
    const recur=(D.recurring||[]).filter(r=>r.cardId===card.id&&r.startYm<=billingYm).reduce((s,r)=>s+r.amount,0);

    billingRows+=`<tr>

    <tbody>${billingRows}</tbody></table>

  const allInst=[];

    D.records.filter(r=>isCreditRec(r,card.id)&&r.installment&&r.installmentTotal>0).forEach(r=>{
      const startYm=billYmFor(r.date,card.billingDate);
      const paid=Math.min(Math.max(0,monthDiff(startYm,nowYm)+1),r.installmentTotal);
      allInst.push({r,card,paid,remain:r.installmentTotal-paid,monthly:Math.round(r.amount/r.installmentTotal)});

  else{

      const done=remain===0; const pct=Math.round(paid/r.installmentTotal*100);
      return `<div style="padding:12px 0;border-bottom:1px solid var(--bdr)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div style="font-size:14px;font-weight:500">${r.category}${r.note?' · '+r.note:''}</div>
            <div style="font-size:11px;color:var(--tx2)">${card.name} · ${r.date} · 每期 ${nt(monthly)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px">
            <div style="font-size:15px;font-weight:700;color:var(--org)">${nt(r.amount)}</div>
            <div style="font-size:11px;color:${done?'var(--grn)':'var(--tx2)'}">${done?'✓ 已還清':'剩 '+remain+' 期'}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="prog" style="flex:1"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div style="font-size:11px;color:var(--tx2);white-space:nowrap">${paid}/${r.installmentTotal} 期</div>
        </div>
      </div>`;
    }).join('')+`<div style="text-align:right;padding:10px 0 4px;font-size:13px;color:var(--tx2)">
      未結清分期餘額合計：<span style="color:var(--red);font-weight:700">${nt(allInst.filter(x=>x.remain>0).reduce((s,x)=>s+x.remain*x.monthly,0))}</span>
    </div>`;
  }
  renderAllRecurring();
  const scheduleRows=[];
  for(let mo=0;mo<12;mo++){
    const ym=addMonths(nowYm,mo); let total=0; const breakdown=[];
    D.cards.forEach(card=>{
      const instRecs=D.records.filter(r=>isCreditRec(r,card.id)&&r.installment);
      const amt=instPaymentsForYm(instRecs,card,ym).reduce((s,x)=>s+x.amt,0);

    });
    scheduleRows.push({ym,total,breakdown});
  }
  document.getElementById('cr-all-schedule').innerHTML=`
    <table class="stbl"><thead><tr><th>月份</th><th>各卡明細</th><th>分期合計</th></tr></thead>
    <tbody>${scheduleRows.map(row=>`
      <tr style="${row.ym===nowYm?'background:rgba(0,191,165,.07)':''}">
        <td style="white-space:nowrap">${ymLabel(row.ym)}${row.ym===nowYm?' <span style="font-size:10px;color:var(--acc)">▸本月</span>':''}</td>
        <td style="font-size:12px;color:var(--tx2)">${row.breakdown.join('、')||'-'}</td>
        <td style="font-weight:700;color:${row.total?'var(--acc)':'var(--tx2)'}">${row.total?nt(row.total):'-'}</td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function delRecurring(id){
  if(!confirm('確定取消此固定扣款項目？')) return;
  if(!D.recurring) D.recurring=[];
  D.recurring=D.recurring.filter(r=>r.id!==id);
  loading(true); await saveData(); loading(false);
  tip('已取消固定扣款'); renderCreditPage();
}
function renderCreditCard(){
  const card=D.cards[crCardIdx]; if(!card) return;
  const fromYm=document.getElementById('cr-from').value||addMonths(ymStr(new Date()),-2);
  const toYm=document.getElementById('cr-to').value||ymStr(new Date());
  const allCard=D.records.filter(r=>isCreditRec(r,card.id));
  const rangeRecs=allCard.filter(r=>r.date.slice(0,7)>=fromYm&&r.date.slice(0,7)<=toYm);
  renderBilling(card,allCard); renderCrDetail(rangeRecs); renderInstTrack(allCard,card,toYm); renderRecurring(card); renderMonthly(card,allCard,fromYm,toYm);
}
function renderBilling(card,recs){
  const now=new Date(); const nowYm=ymStr(now);
  const billingYm=now.getDate()<=card.billingDate?nowYm:addMonths(nowYm,1);
  const p=billPeriod(billingYm,card.billingDate);
  const lump=recs.filter(r=>!r.installment&&r.date>=p.ss&&r.date<=p.es).reduce((s,r)=>s+r.amount,0);
  const inst=instPaymentsForYm(recs.filter(r=>r.installment),card,billingYm).reduce((s,x)=>s+x.amt,0);
  const recur=(D.recurring||[]).filter(r=>r.cardId===card.id&&r.startYm<=billingYm).reduce((s,r)=>s+r.amount,0);
  document.getElementById('cr-billing').innerHTML=`
    <div style="font-size:12px;color:var(--tx2);margin-bottom:10px">${p.ss} ～ ${p.es}（每月 ${card.billingDate} 號結帳）</div>
    <div class="ri"><span style="color:var(--tx2)">付清消費</span><span class="c-org">${nt(lump)}</span></div>
    <div class="ri"><span style="color:var(--tx2)">分期款</span><span class="c-org">${nt(inst)}</span></div>
    ${recur?`<div class="ri"><span style="color:var(--tx2)">每月固定</span><span style="color:var(--purple)">${nt(recur)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0">
      <span style="font-weight:700;font-size:15px">本期應繳</span>
      <span style="font-size:22px;font-weight:800;color:var(--acc)">${nt(lump+inst+recur)}</span>
    </div>`;
}
function instPaymentsForYm(instRecs,card,targetYm){
  return instRecs.flatMap(r=>{
    const startYm=billYmFor(r.date,card.billingDate);
    const diff=monthDiff(startYm,targetYm);
    if(diff>=0&&diff<r.installmentTotal) return [{rec:r,no:diff+1,amt:Math.round(r.amount/r.installmentTotal)}];
    return [];
  });
}
function renderCrDetail(recs){
  const sorted=[...recs].sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('cr-detail');
  if(!sorted.length){ el.innerHTML='<div class="empty">所選期間無消費記錄</div>'; return; }
  el.innerHTML=sorted.map(r=>`
    <div class="ri">
      <div>
        <div class="ri-cat">${r.category}
          <span class="badge" style="background:${r.installment?'rgba(255,183,77,.2)':'rgba(0,191,165,.15)'};color:${r.installment?'var(--org)':'var(--acc)'}">${r.installment?`分${r.installmentTotal}期`:'付清'}</span>
        </div>
        <div class="ri-sub">${r.date}${r.note?' · '+r.note:''}</div>
      </div>
      <div class="ri-amt c-red">-${nt(r.amount)}</div>
    </div>`).join('');
}
function renderInstTrack(recs,card,viewYm){
  const inst=recs.filter(r=>r.installment&&r.installmentTotal>0);
  const el=document.getElementById('cr-inst');
  if(!inst.length){ el.innerHTML='<div class="empty">無分期記錄</div>'; return; }
  const nowYm=viewYm||ymStr(new Date());
  el.innerHTML=inst.map(r=>{
    const startYm=billYmFor(r.date,card.billingDate);
    const paid=Math.min(Math.max(0,monthDiff(startYm,nowYm)+1),r.installmentTotal);
    const remain=r.installmentTotal-paid;
    const monthly=Math.round(r.amount/r.installmentTotal);
    const pct=Math.round(paid/r.installmentTotal*100);
    const done=remain===0;
    return `<div style="padding:12px 0;border-bottom:1px solid var(--bdr)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <div style="font-size:14px;font-weight:500">${r.category}${r.note?' · '+r.note:''}</div>
          <div style="font-size:11px;color:var(--tx2)">${r.date} · 每期 ${nt(monthly)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:700;color:var(--org)">${nt(r.amount)}</div>
          <div style="font-size:11px;color:${done?'var(--grn)':'var(--tx2)'}">${done?'✓ 已還清':'已繳 '+paid+'/'+r.installmentTotal+' 期'}</div>
        </div>
      </div>
      <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
function renderMonthly(card,recs,fromYm,toYm){
  const rows=[]; let cur=fromYm; const limit=addMonths(toYm,4);
  while(cur<=limit){
    const lump=recs.filter(r=>!r.installment&&billYmFor(r.date,card.billingDate)===cur).reduce((s,r)=>s+r.amount,0);
    const inst=instPaymentsForYm(recs.filter(r=>r.installment),card,cur).reduce((s,x)=>s+x.amt,0);
    const recur=(D.recurring||[]).filter(r=>r.cardId===card.id&&r.startYm<=cur).reduce((s,r)=>s+r.amount,0);
    const total=lump+inst+recur;
    if(total>0||cur<=toYm) rows.push({ym:cur,lump,inst,recur,total});
    cur=addMonths(cur,1); if(rows.length>36) break;
  }
  const nowYm=ymStr(new Date());
  const el=document.getElementById('cr-monthly');
  if(!rows.length){ el.innerHTML='<div class="empty">無資料</div>'; return; }
  el.innerHTML=`<table class="stbl">
    <thead><tr><th>帳單月份</th><th>付清</th><th>分期款</th><th>每月固定</th><th>應繳合計</th></tr></thead>
    <tbody>${rows.map(r=>`
      <tr style="${r.ym===nowYm?'background:rgba(0,191,165,.07)':''}">
        <td>${ymLabel(r.ym)}${r.ym===nowYm?' <span style="font-size:10px;color:var(--acc)">▸本期</span>':''}</td>
        <td class="c-org">${r.lump?nt(r.lump):'-'}</td>
        <td class="c-org">${r.inst?nt(r.inst):'-'}</td>
        <td style="color:var(--purple)">${r.recur?nt(r.recur):'-'}</td>
        <td style="font-weight:700;color:var(--acc)">${nt(r.total)}</td>
      </tr>`).join('')}
    </tbody></table>`;
}

// ── Excel Export ────────────────────────────────────────────────────────
function exportExcel(){
  const card=D.cards[crCardIdx]; if(!card){ tip('請選擇信用卡',false); return; }
  const fromYm=document.getElementById('cr-from').value;
  const toYm=document.getElementById('cr-to').value;
  const allCard=D.records.filter(r=>isCreditRec(r,card.id));
  const rangeRecs=allCard.filter(r=>r.date.slice(0,7)>=fromYm&&r.date.slice(0,7)<=toYm);
  const instRecs=allCard.filter(r=>r.installment&&r.installmentTotal>0);
  const wb=XLSX.utils.book_new();
  const s1=[['日期','類別','備註','金額(NT$)','付款類型','分期期數']];
  [...rangeRecs].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r=>
    s1.push([r.date,r.category,r.note||'',r.amount,r.installment?'分期':'付清',r.installment?r.installmentTotal:'']));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),'消費明細');
  const maxN=instRecs.reduce((m,r)=>Math.max(m,r.installmentTotal),0);
  const s2hdr=['品項','類別','消費日','總金額','每期金額','期數','起始帳單月'];
  for(let i=1;i<=maxN;i++) s2hdr.push(`第${i}期`);
  const s2=[s2hdr];
  instRecs.forEach(r=>{
    const startYm=billYmFor(r.date,card.billingDate);
    const monthly=Math.round(r.amount/r.installmentTotal);
    const row=[r.note||r.category,r.category,r.date,r.amount,monthly,r.installmentTotal,startYm];
    for(let i=0;i<maxN;i++) row.push(i<r.installmentTotal?monthly:'');
    s2.push(row);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),'分期追蹤表');
  const s3=[['帳單月份','付清消費','分期款','應繳合計']];
  let cur=fromYm; const lmt=addMonths(toYm,4); let cnt=0;
  while(cur<=lmt&&cnt<36){
    const lump=allCard.filter(r=>!r.installment&&billYmFor(r.date,card.billingDate)===cur).reduce((s,r)=>s+r.amount,0);
    const inst=instPaymentsForYm(instRecs,card,cur).reduce((s,x)=>s+x.amt,0);
    s3.push([ymLabel(cur),lump,inst,lump+inst]); cur=addMonths(cur,1); cnt++;
  }
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s3),'每月帳單摘要');
  const nowYm=ymStr(new Date());
  const s4=[['品項','類別','總金額','每期金額','總期數','已繳期數','剩餘期數','剩餘金額']];
  instRecs.forEach(r=>{
    const startYm=billYmFor(r.date,card.billingDate);
    const paid=Math.min(Math.max(0,monthDiff(startYm,nowYm)+1),r.installmentTotal);
    const remain=r.installmentTotal-paid;
    if(remain>0){
      const monthly=Math.round(r.amount/r.installmentTotal);
      s4.push([r.note||r.category,r.category,r.amount,monthly,r.installmentTotal,paid,remain,remain*monthly]);
    }
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s4),'分期未結清');
  XLSX.writeFile(wb,`${card.name}_${fromYm}_${toYm}.xlsx`);
  tip('✓ Excel 已匯出');
}

// ── Settings Page ───────────────────────────────────────────────────────
function renderSettings(){
  document.getElementById('s-key').value=CFG.apiKey||'';
  document.getElementById('s-bin').value=CFG.binId||'';
  renderCardList(); renderCatList();
}
async function saveCfg(){
  CFG.apiKey=document.getElementById('s-key').value.trim();
  CFG.binId=document.getElementById('s-bin').value.trim();
  cfgSave(); tip('✓ 設定已儲存，檢查雲端資料…');
  loading(true);
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG.binId}/latest`,{headers:{'X-Master-Key':CFG.apiKey}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json(); const remote=j.record||{};
    const remoteCount=(remote.records||[]).length+(remote.cards||[]).length;
    const localCount=D.records.length+D.cards.length;
    if(remoteCount===0&&localCount>0){
      tip('雲端無資料，上傳本機資料中…');
      await saveData();
      tip(`✓ 已上傳本機資料：${D.cards.length}張卡，${D.records.length}筆紀錄`);
    } else {
      D={cards:[],categories:[...DEF_CATS],records:[],recurring:[],...remote};
      if(!D.categories.length) D.categories=[...DEF_CATS];
      migrateAll(); localSave();
      tip(`✓ 已從雲端載入：${D.cards.length}張卡，${D.records.length}筆紀錄`);
    }
  }catch(e){ tip('⚠ 連線失敗：'+e.message,false); }
  loading(false);
  rebuildCatSelect(); rebuildCardSelect(); renderRecent(); renderSettings();
  updateBalanceCards();
}
async function addCard(){
  const name=document.getElementById('s-cname').value.trim();
  const bill=parseInt(document.getElementById('s-cbill').value);
  if(!name){ tip('請輸入卡片名稱',false); return; }
  if(!bill||bill<1||bill>31){ tip('結帳日請輸入 1~31',false); return; }
  D.cards.push({id:uid(),name,billingDate:bill});
  document.getElementById('s-cname').value='';
  document.getElementById('s-cbill').value='';
  loading(true); await saveData(); loading(false);
  renderCardList(); rebuildCardSelect(); tip('✓ 已新增信用卡');
}
async function delCard(id){
  if(!confirm('確定刪除此信用卡？')) return;
  D.cards=D.cards.filter(c=>c.id!==id);
  if(crCardIdx>=D.cards.length) crCardIdx=-1;
  loading(true); await saveData(); loading(false);
  renderCardList(); rebuildCardSelect(); tip('已刪除');
}
function renderCardList(){
  const el=document.getElementById('card-list');
  if(!D.cards.length){ el.innerHTML='<div class="empty" style="padding:16px 0">尚未新增信用卡</div>'; return; }
  el.innerHTML=D.cards.map(c=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr)">
      <div><div style="font-weight:500">${c.name}</div><div style="font-size:12px;color:var(--tx2)">每月 ${c.billingDate} 號結帳</div></div>
      <button class="btn btn-danger btn-sm" onclick="delCard('${c.id}')">刪除</button>
    </div>`).join('');
}
async function addCat(){
  const name=document.getElementById('s-cat').value.trim();
  if(!name){ tip('請輸入分類名稱',false); return; }
  if(D.categories.includes(name)){ tip('此分類已存在',false); return; }
  D.categories.push(name);
  document.getElementById('s-cat').value='';
  loading(true); await saveData(); loading(false);
  renderCatList(); rebuildCatSelect(); tip('✓ 已新增分類');
}
async function delCat(name){
  D.categories=D.categories.filter(c=>c!==name);
  loading(true); await saveData(); loading(false);
  renderCatList(); rebuildCatSelect(); tip('已刪除');
}
function renderCatList(){
  document.getElementById('cat-list').innerHTML=D.categories.map(c=>
    `<span class="chip">${c} <button onclick="delCat('${c}')">✕</button></span>`).join('');
}
async function reloadAll(){
  await loadData(true);
  rebuildCatSelect(); rebuildCardSelect(); renderRecent(); renderCardList(); renderCatList();
  updateBalanceCards();
}
function clearCache(){
  if(!confirm('確定清除本機快取？不影響 JSONBin 雲端資料。')) return;
  localStorage.removeItem('acct_d'); tip('已清除本機快取');
}

// ── Init ────────────────────────────────────────────────────────────────
async function init(){
  cfgLoad();
  await loadData();
  document.getElementById('e-date').value=todayStr();
  ovYm=ymStr(new Date());
  rebuildCatSelect();
  rebuildCardSelect();
  renderRecent();
  updateBalanceCards();
}
init();
</script>
